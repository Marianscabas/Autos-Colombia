<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autos Colombia - Sistema Integral</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="contenedor-principal">

    <div id="menu-inicio" class="tarjeta">
      <header>
        <h1>Autos Colombia</h1>
        <p class="subtitulo">Control de Parqueadero v2.0 (Manual)</p>
      </header>

      <div class="grid-menu">
        <button type="button" class="btn-menu" data-seccion="usuarios">
          <span class="icono">👤</span>
          <b>Usuarios</b>
        </button>
        <button type="button" class="btn-menu" data-seccion="celdas">
          <span class="icono">🅿️</span>
          <b>Celdas</b>
        </button>
        <button type="button" class="btn-menu" data-seccion="historial">
          <span class="icono">📜</span>
          <b>Historial</b>
        </button>
        <button type="button" class="btn-menu" data-seccion="recibo">
          <span class="icono">🧾</span>
          <b>Recibo</b>
        </button>
      </div>
    </div>

    <div id="vista-formulario" class="tarjeta oculto">
      <div class="cabecera-form">
        <button type="button" id="btn-volver" class="btn-volver">⬅ Volver al menú</button>
        <h2 id="titulo-form">Cargando...</h2>
      </div>

      <p id="mensaje" class="mensaje-alerta"></p>

      <div id="campos" class="cuerpo-formulario"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>

</html>
